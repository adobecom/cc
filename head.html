<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body {
    display: none;
  }
  .reading-width {
    max-width: 800px;
    margin: auto;
    padding: 20px;
  }

  .reading-width-footer-tag {
    max-width: 800px;
    margin: -20px auto;
    padding: 0 20px 20px;
  }

  .reading-width-footer-tag > .content {
    max-width: var(--grid-container-width);
    margin: 0 auto;
  }
  /* TODO: Remove once style is handled in merch */
  :root:has(meta[name='theme'][content='max25']) {
    @media screen and (max-width: 767px) {
      .two-merch-cards.mini-compare-chart,
      .three-merch-cards.mini-compare-chart,
      .four-merch-cards.mini-compare-chart {
        grid-template-columns: 310px;
      }
    }

    @media screen and (min-width: 768px) {
      .three-merch-cards.mini-compare-chart,
      .four-merch-cards.mini-compare-chart {
        grid-template-columns: repeat(2, 310px);
      }
    }

    @media screen and (min-width: 1200px) {
      .three-merch-cards.mini-compare-chart,
      .four-merch-cards.mini-compare-chart {
        grid-template-columns: repeat(3, 310px);
      }
    }

    @media screen and (min-width: 1600px) {
      .four-merch-cards.mini-compare-chart {
        grid-template-columns: repeat(4, 336px);
      }
    }
  }
</style>
<script src="/creativecloud/scripts/fallback.js" nomodule></script>
<script type="module">
  import { scriptInit } from '/creativecloud/scripts/utils.js';
  scriptInit();
</script>
<script src="/creativecloud/animation/rebound.runtime.js" ></script>
<script>
  function loadScript(src, callback) {
    const script = document.createElement('script');
    script.src = src;
    script.type = 'text/javascript';
    
    // Optional: Handle load success
    script.onload = function() {
      console.log('Script loaded successfully');
      if (callback) callback(null);
    };
    
    // Optional: Handle load error
    script.onerror = function() {
      console.error('Failed to load script');
      if (callback) callback(new Error('Script load error'));
    };
    
    document.head.appendChild(script);
  }
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('mode') === 'rebound') {
    loadScript('/creativecloud/animation/rebound.editor.js', function(err) {
      if (err) {
        console.error('Error loading script:', err);
      } else {
        const editor = new window.Rebound.Editor({
          openButton: null,
          // optional: customize storage key
          // storageKey: 'rebound:my-page:v1',
          onSave: (jsonText, configObj) => {
            console.log('Saved config:', jsonText);
          }
        });
        editor.open();
      }
    });
  }
</script>
