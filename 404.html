<!DOCTYPE html>
<html>

<head>
  <title>404</title>
  <meta name="template" content="404" />
  <meta name="404" content="feds" />
  <meta name="header" content="global-navigation" />
  <meta name="footer" content="global-footer" />
  <meta name="target" content="on" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="module">
    import { scriptInit } from '/creativecloud/scripts/utils.js';
    // TODO: Remove once georouting is disabled site-wide.
    // Matches /fr/ and any regional French locales (e.g., lu_fr, ch_fr, be_fr, ca_fr)
    const path = window.location.pathname.toLowerCase();
    if (/^\/([a-z]{2}_fr|fr)\//.test(path)) {
      const meta = document.createElement('meta');
      meta.setAttribute('name', 'georouting');
      meta.setAttribute('content', 'off');
      document.head.append(meta);
    }

    scriptInit();
  </script>
  <link rel="icon" href="data:," />
</head>

<body>
  <header></header>
  <main>
    <div></div>
  </main>
  <footer></footer>
</body>

</html>
